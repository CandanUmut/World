name: Deploy to GitHub Pages

on:
  push:
    branches:
      # Deploy from the active development branch and from main once merged.
      - main
      - claude/real-earth-app-Lh4nY
  workflow_dispatch:

# Allow this workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Repo is candanumut/world → Pages serves at /world/.
          VITE_BASE: /world/
          # Optional free ion token (set as a repo secret to enable ion paths).
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
